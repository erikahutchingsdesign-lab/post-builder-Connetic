<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
</helmet>

<div ref="{{ rootRef }}" style="position:relative; width:100%; height:100%; overflow:hidden; background:#0d2236;">
  <div style="{{ innerStyle }}">{{ graphicEl }}</div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:420,&quot;height&quot;:420},&quot;template&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;statement&quot;,&quot;megastatement&quot;,&quot;headline&quot;,&quot;spotlight&quot;,&quot;bigcenter&quot;,&quot;twopart&quot;,&quot;arrowpoint&quot;,&quot;list&quot;,&quot;arrowlist&quot;,&quot;socialcard&quot;,&quot;photoquote&quot;,&quot;spokesperson&quot;,&quot;image&quot;],&quot;default&quot;:&quot;statement&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;size&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;square&quot;,&quot;banner&quot;,&quot;tall&quot;],&quot;default&quot;:&quot;square&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;quote&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Access is the whole thesis.&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;image&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;assets/img/connetic-network.png&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;headshot&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;assets/brad.jpg&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;gold&quot;,&quot;lime&quot;,&quot;green&quot;,&quot;white&quot;],&quot;default&quot;:&quot;gold&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;coBrand&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;source&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { scale: 0.33 };

  PEOPLE = { name:'Brad Zapp', cred:'CFP\u00ae', title:'President and Fund Manager, Connetic RIA LLC', headshot:'assets/brad.jpg' };

  setRoot = (node)=>{
    if(!node || node===this._root) return;
    this._root = node;
    const measure = ()=>{ const w=node.clientWidth; if(w && Math.abs(w/1200-this.state.scale)>0.0001) this.setState({scale:w/1200}); };
    try{ this._ro = new ResizeObserver(measure); this._ro.observe(node); }catch(e){}
    measure();
  };
  componentWillUnmount(){ if(this._ro) try{ this._ro.disconnect(); }catch(e){} }

  /* ---------- brand visual helpers ---------- */
  gradBG(kind){
    const el=React.createElement;
    const G = kind==='green' ? 'linear-gradient(158deg,#0d4023 0%,#1a6e3a 50%,#2f9e5c 100%)'
      : kind==='teal' ? 'linear-gradient(150deg,#1c5a86 0%,#1f8479 52%,#2fa468 100%)'
      : 'linear-gradient(150deg,#1d4a86 0%,#236f80 50%,#2f9e6b 100%)';
    return el('div',{key:'bg',style:{position:'absolute',inset:0,background:G}});
  }
  texContour(op){
    const el=React.createElement; const paths=[];
    for(let i=0;i<8;i++){ const y=40+i*150; paths.push('M -60 '+y+' C 250 '+(y-95)+', 520 '+(y+120)+', 820 '+(y-30)+' S 1320 '+(y+95)+', 1320 '+y); }
    return el('svg',{key:'ct',viewBox:'0 0 1200 1200',preserveAspectRatio:'none',style:{position:'absolute',inset:0,width:'100%',height:'100%',opacity:Math.min((op||.1)*1.85,0.5),pointerEvents:'none'}},
      paths.map((d,i)=>el('path',{key:i,d:d,fill:'none',stroke:'#ffffff',strokeWidth:1.3})));
  }
  texMesh(op){
    const el=React.createElement;
    const pts=[[80,120],[300,70],[520,160],[760,90],[1000,150],[1150,300],[180,360],[430,320],[680,380],[930,340],[120,640],[360,600],[600,660],[860,620],[1100,640],[260,900],[520,940],[800,900],[1050,920],[160,1120],[440,1150],[720,1110],[980,1150]];
    const lines=[[0,1],[1,2],[2,3],[3,4],[4,5],[0,6],[1,7],[2,8],[3,9],[6,7],[7,8],[8,9],[9,5],[6,10],[7,11],[8,12],[9,13],[10,11],[11,12],[12,13],[13,14],[10,15],[11,16],[12,17],[13,18],[15,16],[16,17],[17,18],[15,19],[16,20],[17,21],[18,22],[19,20],[20,21],[21,22]];
    return el('svg',{key:'mesh',viewBox:'0 0 1200 1200',preserveAspectRatio:'none',style:{position:'absolute',inset:0,width:'100%',height:'100%',opacity:Math.min((op||.18)*1.6,0.5),pointerEvents:'none'}},[
      el('g',{key:'l',stroke:'#ffffff',strokeWidth:1,opacity:.5},lines.map((lk,i)=>el('line',{key:i,x1:pts[lk[0]][0],y1:pts[lk[0]][1],x2:pts[lk[1]][0],y2:pts[lk[1]][1]}))),
      el('g',{key:'n',fill:'#ffffff'},pts.map((p,i)=>el('circle',{key:i,cx:p[0],cy:p[1],r:3.4})))
    ]);
  }
  texDots(op){
    const el=React.createElement;
    const svg="<svg xmlns='http://www.w3.org/2000/svg' width='36' height='36'><circle cx='4' cy='4' r='2' fill='white'/></svg>";
    return el('div',{key:'dots',style:{position:'absolute',inset:0,backgroundImage:"url(\"data:image/svg+xml;utf8,"+encodeURIComponent(svg)+"\")",backgroundSize:'36px 36px',opacity:Math.min((op||.12)*1.85,0.5),pointerEvents:'none'}});
  }
  texHex(op){
    const el=React.createElement;
    const svg="<svg xmlns='http://www.w3.org/2000/svg' width='60' height='68'><path d='M30 2 L56 17 L56 47 L30 62 L4 47 L4 17 Z' fill='none' stroke='white' stroke-width='1.3'/></svg>";
    return el('div',{key:'hex',style:{position:'absolute',inset:0,backgroundImage:"url(\"data:image/svg+xml;utf8,"+encodeURIComponent(svg)+"\")",backgroundSize:'60px 68px',opacity:Math.min((op||.1)*1.85,0.5),pointerEvents:'none'}});
  }
  nodeGraphic(px){
    const el=React.createElement; const C='#8CC63F';
    const nodes=[[18,52,15],[36,36,12],[40,68,11],[56,28,13],[60,53,17],[78,42,10],[74,70,12],[52,80,10]];
    const links=[[0,1],[1,3],[3,4],[4,5],[4,6],[2,4],[2,7],[6,7],[1,2]];
    const ctr=i=>[nodes[i][0]+nodes[i][2]/2, nodes[i][1]+nodes[i][2]/2];
    return el('svg',{key:'ng',viewBox:'0 0 100 100',width:px,height:px,style:{display:'block'}},[
      el('g',{key:'l',stroke:C,strokeWidth:2.2,opacity:.6},links.map((lk,i)=>{const a=ctr(lk[0]),b=ctr(lk[1]);return el('line',{key:i,x1:a[0],y1:a[1],x2:b[0],y2:b[1]});})),
      el('g',{key:'n',fill:C},nodes.map((n,i)=>el('rect',{key:i,x:n[0],y:n[1],width:n[2],height:n[2],rx:2.6})))
    ]);
  }
  avatar(cfg, px){
    const el=React.createElement;
    return el('div',{key:'av',style:{width:px+'px',height:px+'px',borderRadius:'50%',overflow:'hidden',border:'4px solid #8CC63F',boxShadow:'0 0 0 1.5px rgba(255,255,255,.3)',flex:'none',background:'#13314f'}},[
      el('img',{key:'i',src:cfg.headshot,crossOrigin:'anonymous',style:{width:'100%',height:'100%',objectFit:'cover',objectPosition:'center 18%'}})
    ]);
  }

  /* ---------- design renderer (1200 wide) ---------- */
  design(post, H){
    const el=React.createElement;
    const W=1200; const t=post.type; const tpl=t==='image'?'image':post.template;
    const LIME='#8CC63F', GOLD='#E0A93B', WHITE='#ffffff';
    const cfg = Object.assign({}, this.PEOPLE, { headshot: post.headshot || this.PEOPLE.headshot });
    const who = cfg.cred ? cfg.name+', '+cfg.cred : cfg.name;
    const q = post.quote || 'This is where you say something meaningful to your audience.';
    const base = {position:'absolute',width:W+'px',height:H+'px',overflow:'hidden',fontFamily:'var(--sans)'};
    const img = (src,style)=> el('img',{src:src,crossOrigin:'anonymous',style:Object.assign({position:'absolute',width:'100%',height:'100%',objectFit:'cover'},style)});
    const ACCENTS={gold:GOLD,lime:LIME,green:'#5e9e2c',white:'#ffffff'};
    const DEF_ACC={statement:GOLD,megastatement:LIME,headline:LIME,spotlight:LIME,bigcenter:GOLD,twopart:GOLD,arrowpoint:GOLD,list:LIME,arrowlist:LIME,socialcard:'#1f7e79',photoquote:LIME,spokesperson:GOLD};
    const ACC = post.accent ? (ACCENTS[post.accent]||post.accent) : (DEF_ACC[tpl]||GOLD);
    const renderQ=(text)=>{
      const out=[]; let k=0;
      String(text).split(/(\*[^*]+\*)/g).forEach(seg=>{
        if(/^\*[^*]+\*$/.test(seg)){ out.push(el('span',{key:k++,style:{color:ACC}}, seg.slice(1,-1))); }
        else { seg.split('\n').forEach((ln,li)=>{ if(li>0) out.push(el('br',{key:k++})); if(ln) out.push(ln); }); }
      });
      return out;
    };

    if(tpl==='image') return el('div',{style:Object.assign({},base,{background:'#0d2a48'})},[ img(post.image,{inset:0,key:'i'}) ]);

    if(tpl==='headline'){
      const fs=H<=627?64:(H>=1600?100:88);
      return el('div',{style:base},[
        this.gradBG('blue'), this.texContour(.13),
        el('div',{key:'c',style:{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',textAlign:'center',padding:(H<=627?'60px 90px':'88px 100px')}},[
          el('div',{key:'q',style:{fontFamily:'var(--display)',fontWeight:900,fontSize:fs+'px',lineHeight:1.02,letterSpacing:'-.01em',color:WHITE,textTransform:'uppercase',textWrap:'balance'}}, renderQ(q)),
          el('div',{key:'av',style:{marginTop:(H<=627?'34px':'54px')}}, this.avatar(cfg, H<=627?112:148)),
          el('div',{key:'nm',style:{fontFamily:'var(--display)',fontWeight:800,fontSize:(H<=627?23:30)+'px',color:GOLD,marginTop:'22px'}}, who),
          el('div',{key:'tl',style:{fontFamily:'var(--sans)',fontWeight:500,fontSize:(H<=627?15:19)+'px',color:'rgba(255,255,255,.9)',marginTop:'6px'}}, cfg.title)
        ])
      ]);
    }

    if(tpl==='statement'){
      const fs=H<=627?52:(H>=1600?80:68);
      return el('div',{style:base},[
        this.gradBG('teal'), this.texMesh(.14),
        el('div',{key:'ng',style:{position:'absolute',right:(H<=627?'-60px':'-90px'),bottom:(H<=627?'-60px':'-100px')}}, this.nodeGraphic(H<=627?320:500)),
        el('div',{key:'c',style:{position:'absolute',inset:0,display:'flex',flexDirection:'column',justifyContent:'center',paddingLeft:'84px',paddingRight:(H<=627?'90px':'120px')}},[
          post.coBrand? el('div',{key:'co',style:{alignSelf:'flex-start',background:'#fff',borderRadius:'12px',padding:(H<=627?'12px 18px':'15px 24px'),marginBottom:(H<=627?'26px':'42px'),boxShadow:'0 6px 22px rgba(8,30,50,.2)'}},[
            el('img',{key:'i',src:'assets/advisorpedia.png',crossOrigin:'anonymous',style:{height:(H<=627?'38px':'54px'),width:'auto',display:'block'}})
          ]):null,
          el('div',{key:'q',style:{fontFamily:'var(--display)',fontWeight:800,fontSize:fs+'px',lineHeight:1.08,letterSpacing:'-.02em',color:WHITE,textWrap:'balance'}}, renderQ(q)),
          el('div',{key:'nm',style:{fontFamily:'var(--display)',fontWeight:800,fontSize:(H<=627?26:32)+'px',color:LIME,marginTop:(H<=627?'26px':'40px')}}, who),
          el('div',{key:'tl',style:{fontFamily:'var(--sans)',fontWeight:500,fontSize:(H<=627?18:22)+'px',color:'rgba(255,255,255,.92)',marginTop:'8px',maxWidth:'640px'}}, cfg.title)
        ])
      ]);
    }

    if(tpl==='bigcenter'){
      const fs=H<=627?66:(H>=1600?108:94);
      return el('div',{style:base},[
        this.gradBG('blue'), this.texMesh(.13),
        el('div',{key:'ng',style:{position:'absolute',left:'50%',bottom:(H<=627?'-55px':'-85px'),transform:'translateX(-50%)'}}, this.nodeGraphic(H<=627?260:410)),
        el('div',{key:'c',style:{position:'absolute',left:0,right:0,top:0,bottom:(H<=627?'118px':'182px'),display:'flex',flexDirection:'column',justifyContent:'center',padding:(H<=627?'0 64px':'0 90px'),textAlign:'center'}},[
          el('div',{key:'q',style:{fontFamily:'var(--display)',fontWeight:800,fontSize:fs+'px',lineHeight:1.06,letterSpacing:'-.02em',color:WHITE,textWrap:'balance'}}, renderQ(q)),
          el('div',{key:'nm',style:{fontFamily:'var(--display)',fontWeight:800,fontSize:(H<=627?24:30)+'px',color:GOLD,marginTop:(H<=627?'24px':'36px')}}, who),
          el('div',{key:'tl',style:{fontFamily:'var(--sans)',fontWeight:500,fontSize:(H<=627?16:20)+'px',color:'rgba(255,255,255,.9)',marginTop:'6px'}}, cfg.title)
        ])
      ]);
    }

    if(tpl==='twopart'){
      const parts=String(q).split(/\n\s*\n|\s*\|\|\s*/).map(s=>s.trim()).filter(Boolean);
      const lead=parts[0]||q; const punch=parts.slice(1).join('  ');
      const fs=H<=627?44:(H>=1600?64:56);
      return el('div',{style:base},[
        this.gradBG('green'), this.texMesh(.12),
        el('div',{key:'c',style:{position:'absolute',left:0,right:0,top:0,bottom:(H<=627?'100px':'150px'),display:'flex',flexDirection:'column',justifyContent:'center',paddingLeft:'84px',paddingRight:(H<=627?'90px':'150px')}},[
          el('div',{key:'a',style:{fontFamily:'var(--display)',fontWeight:500,fontSize:fs+'px',lineHeight:1.22,letterSpacing:'-.01em',color:WHITE,textWrap:'pretty'}}, renderQ(lead)),
          punch? el('div',{key:'r',style:{width:'170px',height:'2px',background:'rgba(255,255,255,.55)',margin:(H<=627?'24px 0':'36px 0')}}):null,
          punch? el('div',{key:'b',style:{fontFamily:'var(--display)',fontWeight:700,fontSize:fs+'px',lineHeight:1.16,letterSpacing:'-.01em',color:WHITE,textWrap:'pretty'}}, renderQ(punch)):null
        ])
      ]);
    }

    if(tpl==='list' || tpl==='arrowlist'){
      const arrow = tpl==='arrowlist';
      const lines=String(q).split(/\n+/).map(s=>s.trim()).filter(Boolean);
      const title=lines.length>1?lines[0]:'The Key Points'; const items=lines.length>1?lines.slice(1):lines;
      const ifs=H<=627?34:(H>=1600?56:48);
      return el('div',{style:base},[
        this.gradBG('blue'), this.texDots(.12),
        el('div',{key:'wrap',style:{position:'absolute',left:0,right:0,top:0,bottom:(H<=627?'112px':'176px'),display:'flex',flexDirection:'column',justifyContent:'center',padding:(H<=627?'0 60px':'0 96px')}},[
          el('div',{key:'ti',style:{textAlign:'center',fontFamily:'var(--display)',fontWeight:800,fontSize:(H<=627?48:64)+'px',lineHeight:1.06,letterSpacing:'-.01em',color:WHITE,textWrap:'balance',marginBottom:(H<=627?'26px':'46px')}}, renderQ(title)),
          el('div',{key:'ls',style:{maxWidth:(arrow?'820px':'800px'),width:'100%',margin:'0 auto'}},
            items.slice(0,7).map((it,i)=> el('div',{key:i,style:{display:'flex',gap:(arrow?'22px':'18px'),alignItems:'baseline',marginBottom:(H<=627?'10px':'16px')}},[
              el('span',{key:'n',style:arrow?{fontFamily:'var(--display)',fontWeight:700,fontSize:ifs+'px',color:ACC,minWidth:'42px',lineHeight:1.18}:{fontFamily:'var(--display)',fontWeight:500,fontSize:ifs+'px',color:'rgba(255,255,255,.7)',minWidth:'54px'}}, arrow?'\u2192':((i+1)+'.')),
              el('span',{key:'t',style:{fontFamily:'var(--display)',fontWeight:800,fontSize:ifs+'px',lineHeight:1.18,color:WHITE}}, renderQ(it))
            ]))
          )
        ]),
        el('div',{key:'by',style:{position:'absolute',left:0,right:0,bottom:(H<=627?'40px':'74px'),display:'flex',alignItems:'center',justifyContent:'center',gap:'18px'}},[
          this.avatar(cfg, H<=627?64:86),
          el('div',{key:'tx'},[
            el('div',{key:'nm',style:{fontFamily:'var(--display)',fontWeight:800,fontSize:(H<=627?20:25)+'px',color:WHITE}}, who),
            el('div',{key:'tl',style:{fontFamily:'var(--sans)',fontWeight:500,fontSize:(H<=627?14:17)+'px',color:'rgba(255,255,255,.86)',marginTop:'3px'}}, cfg.title)
          ])
        ])
      ]);
    }

    if(tpl==='socialcard'){
      const fs=H<=627?30:(H>=1600?44:38);
      return el('div',{style:base},[
        this.gradBG('teal'), this.texHex(.12),
        el('div',{key:'card',style:{position:'absolute',left:(H<=627?'60px':'96px'),right:(H<=627?'60px':'96px'),top:'50%',transform:'translateY(-50%)',background:'#fff',borderRadius:'26px',padding:(H<=627?'40px 44px':'56px 60px'),boxShadow:'0 30px 70px rgba(8,30,50,.3)'}},[
          el('div',{key:'h',style:{display:'flex',alignItems:'center',gap:'18px',marginBottom:(H<=627?'24px':'34px')}},[
            el('div',{key:'av',style:{width:'76px',height:'76px',borderRadius:'50%',overflow:'hidden',border:'3px solid #8CC63F',flex:'none',background:'#13314f'}},[
              el('img',{key:'i',src:cfg.headshot,crossOrigin:'anonymous',style:{width:'100%',height:'100%',objectFit:'cover',objectPosition:'center 18%'}})
            ]),
            el('div',{key:'t',style:{flex:1}},[
              el('div',{key:'n',style:{display:'flex',alignItems:'center',gap:'10px'}},[
                el('span',{key:'nm',style:{fontFamily:'var(--display)',fontWeight:800,fontSize:'34px',color:'#1f7e79'}}, who),
                el('span',{key:'v',style:{flex:'none',width:'28px',height:'28px',borderRadius:'50%',background:'#2c9bd6',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:'16px'}},'\u2713')
              ]),
              el('div',{key:'h2',style:{fontFamily:'var(--sans)',fontWeight:700,fontSize:'17px',letterSpacing:'.14em',color:'#0e2236',marginTop:'4px'}},'CONNETIC')
            ])
          ]),
          el('div',{key:'q',style:{fontFamily:'var(--display)',fontWeight:600,fontSize:fs+'px',lineHeight:1.28,letterSpacing:'-.005em',color:'#13283d'}}, renderQ(q))
        ])
      ]);
    }

    if(tpl==='photoquote'){
      const fs=H<=627?56:(H>=1600?94:80);
      return el('div',{style:Object.assign({},base,{background:'#0d2236'})},[
        img(post.image,{inset:0,objectPosition:'center',filter:'saturate(1.02)',opacity:0.4,key:'i'}),
        el('div',{key:'s',style:{position:'absolute',inset:0,background:'linear-gradient(180deg,rgba(8,22,40,.35) 0%,rgba(8,22,40,.05) 38%,rgba(8,22,40,.55) 100%)'}}),
        el('div',{key:'q',style:{position:'absolute',left:'84px',right:'120px',top:'50%',transform:'translateY(-50%)',fontFamily:'var(--display)',fontWeight:800,fontSize:fs+'px',lineHeight:1.04,letterSpacing:'-.02em',color:'#fff',textShadow:'0 2px 24px rgba(0,0,0,.45)',textWrap:'balance'}}, renderQ(q)),
        el('div',{key:'a',style:{position:'absolute',right:'84px',bottom:'76px',fontFamily:'var(--sans)',fontWeight:600,fontSize:'26px',color:'rgba(255,255,255,.92)',textShadow:'0 2px 12px rgba(0,0,0,.5)'}}, post.source||who)
      ]);
    }

    if(tpl==='megastatement'){
      const len=String(q).length;
      const fs=H<=627? (len>120?40:48) : (H>=1600? (len>150?76:90) : (len>150?64:76));
      return el('div',{style:base},[
        this.gradBG('teal'), this.texHex(.09),
        el('div',{key:'c',style:{position:'absolute',inset:0,display:'flex',alignItems:'center',padding:(H<=627?'0 58px':'0 88px')}},[
          el('div',{key:'q',style:{fontFamily:'var(--display)',fontWeight:900,fontSize:fs+'px',lineHeight:1.05,letterSpacing:'-.02em',color:WHITE,textWrap:'balance'}}, renderQ(q))
        ])
      ]);
    }

    if(tpl==='spotlight'){
      const fs=H<=627?54:(H>=1600?106:92);
      return el('div',{style:base},[
        this.gradBG('teal'), this.texContour(.12),
        el('div',{key:'c',style:{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',textAlign:'center',padding:(H<=627?'50px 64px':'80px 96px')}},[
          el('div',{key:'q',style:{fontFamily:'var(--display)',fontWeight:900,fontSize:fs+'px',lineHeight:1.0,letterSpacing:'-.01em',color:WHITE,textTransform:'uppercase'}}, renderQ(q)),
          el('div',{key:'av',style:{marginTop:(H<=627?'34px':'58px')}}, this.avatar(cfg, H<=627?122:172)),
          el('div',{key:'nm',style:{fontFamily:'var(--display)',fontWeight:800,fontSize:(H<=627?24:32)+'px',color:GOLD,marginTop:'24px'}}, who),
          el('div',{key:'tl',style:{fontFamily:'var(--sans)',fontWeight:500,fontSize:(H<=627?16:21)+'px',color:'rgba(255,255,255,.92)',marginTop:'7px'}}, cfg.title)
        ])
      ]);
    }

    if(tpl==='arrowpoint'){
      const parts=String(q).split(/\n\s*\n|\s*\|\|\s*/).map(s=>s.trim()).filter(Boolean);
      const lead=parts[0]||q; const sub=parts[1]||''; const kick=parts[2]||'';
      const fs=H<=627?52:(H>=1600?92:80);
      return el('div',{style:base},[
        el('div',{key:'bg',style:{position:'absolute',inset:0,background:'linear-gradient(180deg,#0a1626 0%,#10355f 48%,#1f6f86 100%)'}}),
        this.texMesh(.16),
        el('div',{key:'c',style:{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',textAlign:'center',padding:(H<=627?'46px 58px':'76px 88px')}},[
          el('div',{key:'q',style:{fontFamily:'var(--display)',fontWeight:900,fontSize:fs+'px',lineHeight:1.02,letterSpacing:'-.02em',color:WHITE}}, renderQ(lead)),
          sub? el('div',{key:'ar',style:{fontFamily:'var(--display)',fontWeight:400,fontSize:(H<=627?38:54)+'px',lineHeight:1,color:WHITE,margin:(H<=627?'12px 0':'20px 0')}},'\u2193'):null,
          sub? el('div',{key:'s',style:{fontFamily:'var(--display)',fontWeight:700,fontSize:(H<=627?30:44)+'px',lineHeight:1.14,color:WHITE,maxWidth:'92%'}}, renderQ(sub)):null,
          kick? el('div',{key:'k',style:{fontFamily:'var(--display)',fontWeight:800,fontSize:(H<=627?30:44)+'px',lineHeight:1.12,color:LIME,marginTop:(H<=627?'18px':'28px')}}, kick):null
        ])
      ]);
    }

    // SPOKESPERSON — default
    const headshot = post.image || cfg.headshot;
    return el('div',{style:base},[
      this.gradBG('teal'), this.texMesh(.1),
      el('div',{key:'pan',style:{position:'absolute',right:0,top:0,bottom:0,width:'40%',overflow:'hidden'}},[ img(headshot,{inset:0,objectPosition:'center 20%',key:'i'}) ]),
      el('div',{key:'seam',style:{position:'absolute',right:'40%',top:0,bottom:0,width:'7px',background:LIME}}),
      el('div',{key:'c',style:{position:'absolute',left:'80px',top:0,bottom:(H<=627?'92px':'118px'),width:'46%',display:'flex',flexDirection:'column',justifyContent:'center'}},[
        el('div',{key:'m',style:{fontFamily:'var(--display)',fontWeight:900,fontSize:'150px',lineHeight:.7,height:'94px',color:LIME}},'\u201c'),
        el('div',{key:'q',style:{fontFamily:'var(--display)',fontWeight:800,fontSize:(H<=627?44:(H>=1600?62:54))+'px',lineHeight:1.08,letterSpacing:'-.02em',color:'#fff'}}, renderQ(q)),
        el('div',{key:'r',style:{width:'80px',height:'4px',background:LIME,marginTop:'26px'}}),
        el('div',{key:'nm',style:{fontFamily:'var(--display)',fontWeight:800,fontSize:'29px',color:GOLD,marginTop:'22px'}}, who),
        el('div',{key:'tl',style:{fontFamily:'var(--sans)',fontWeight:500,fontSize:'21px',lineHeight:1.3,color:'rgba(255,255,255,.9)',marginTop:'6px',width:'88%'}}, cfg.title)
      ])
    ]);
  }

  renderVals(){
    const p=this.props||{};
    const size = p.size || 'square';
    const H = size==='banner'?627 : size==='tall'?1600 : 1200;
    const tpl = p.template || 'statement';
    const post = {
      person:'brad', type: tpl==='image'?'image':'quote', template:tpl,
      quote: p.quote!=null ? p.quote : '',
      image: p.image || 'assets/img/connetic-network.png',
      headshot: p.headshot || null,
      accent: p.accent || null,
      coBrand: p.coBrand===true || p.coBrand==='true',
      source: p.source || null,
    };
    let graphicEl;
    try{ graphicEl = this.design(post, H); }catch(e){ graphicEl = null; }
    const innerStyle = `position:absolute; top:0; left:0; width:1200px; height:${H}px; transform:scale(${this.state.scale}); transform-origin:top left; --display:'Roboto','Helvetica Neue',Arial,sans-serif; --sans:'Poppins','Helvetica Neue',Arial,sans-serif;`;
    return { rootRef:this.setRoot, innerStyle, graphicEl };
  }
}
</script>
</body>
</html>
